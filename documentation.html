                detail: `
                    <p>
                        <b>À quoi sert Nmap ?</b><br>
                        Nmap ("Network Mapper") est l’outil de référence pour découvrir des hôtes et services sur un réseau, détecter les ports ouverts et identifier les systèmes d’exploitation.
                    </p>
                    <p>
                        <b>Quand l’utiliser ?</b><br>
                        - Pour cartographier un réseau cible<br>
                        - Pour rechercher des services vulnérables<br>
                        - En phase de reconnaissance d’un pentest
                    </p>
                    <h3>Commandes de base</h3>
                    <ul>
                        <li><code>nmap 192.168.1.1</code> — Scan simple d’une IP</li>
                        <li><code>nmap 192.168.1.0/24</code> — Scan d’un réseau entier</li>
                        <li><code>nmap -sS cible</code> — Scan SYN (furtif)</li>
                        <li><code>nmap -sV cible</code> — Détection de version des services</li>
                        <li><code>nmap -O cible</code> — Détection du système d’exploitation</li>
                        <li><code>nmap -A cible</code> — Scan avancé (OS, version, script, traceroute)</li>
                        <li><code>nmap -p 22,80,443 cible</code> — Scanner des ports spécifiques</li>
                        <li><code>nmap -p- cible</code> — Scanner tous les 65535 ports</li>
                        <li><code>nmap --script vuln cible</code> — Lancer les scripts de détection de vulnérabilités</li>
                        <li><code>nmap -T4 cible</code> — Accélérer le scan</li>
                    </ul>
                    <h3>Options utiles</h3>
                    <ul>
                        <li><b>-sU</b> : Scan UDP</li>
                        <li><b>-Pn</b> : Ne pas faire de ping (utile si le firewall bloque l’ICMP)</li>
                        <li><b>-oN fichier.txt</b> : Sauvegarder le résultat du scan</li>
                        <li><b>-iL liste.txt</b> : Scanner toutes les IP d’un fichier</li>
                        <li><b>-v</b> : Mode verbeux (plus d’infos)</li>
                    </ul>
                    <h3>Exemple complet</h3>
                    <pre><code>nmap -sS -sV -O -p- -T4 -oN resultat.txt 192.168.1.1</code></pre>
                    <p>
                        <b>Documentation officielle :</b> <a href="https://nmap.org/book/man.html" target="_blank">https://nmap.org/book/man.html</a>

                        <b>À quoi sert Metasploit ?</b><br>

                    <p>
                        <b>Quand l’utiliser ?</b><br>

                        - Pour automatiser l’exploitation de vulnérabilités<br>

                        - Pour obtenir un accès distant (reverse shell, meterpreter, etc.)

                    <h3>Commandes de base</h3>
                    <ul>
                        <li><code>msfconsole</code> — Lancer Metasploit en mode console</li>
                        <li><code>search nom_vuln</code> — Rechercher un module (exploit, scanner...)</li>

                        <li><code>show payloads</code> — Voir les payloads compatibles</li>
                        <li><code>set payload nom_payload</code> — Choisir un payload</li>
                        <li><code>exploit</code> ou <code>run</code> — Lancer l’attaque</li>
                        <li><code>back</code> — Revenir au menu principal</li>
                        <li><code>exit</code> — Quitter Metasploit</li>
